<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Safety Checker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🔐 URL Safety Checker</h1>
        <p>Check if a website is safe or malicious</p>

        <input
            type="text"
            id="urlInput"
            placeholder="Enter URL (e.g., https://example.com)"
        >

        <button class="check-btn" onclick="checkURL()">Check URL</button>

        <div id="resultBox">
            <p id="resultText"></p>
        </div>

        <button id="openBtn" onclick="openURL()">
            Open Anyway 🔗
        </button>
    </div>

    <script src="script.js"></script>
</body>
</html>
